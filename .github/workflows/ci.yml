name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -v

  typescript-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install graphsearch + strawberry CLI
        run: pip install -e ".[dev]" "strawberry-graphql[cli]"
      - name: Export current schema from the live Python code
        run: strawberry export-schema graphsearch.schema:schema -o clients/typescript/schema.graphql
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json
      - name: Install client deps
        working-directory: clients/typescript
        run: npm ci
      - name: Regenerate the TypeScript client
        working-directory: clients/typescript
        run: npm run codegen
      - name: Type-check the generated client
        working-directory: clients/typescript
        run: npm run build
      - name: Fail if schema or generated client drifted from what's committed
        run: git diff --exit-code -- clients/typescript
